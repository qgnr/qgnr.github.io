<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>薇尔莉特·伊芙加登 2048</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#1e40af',
                        secondary: '#f8fafc',
                        accent: '#f59e0b',
                        violet: '#8b5cf6',
                        light: '#dbeafe',
                        dark: '#1e293b',
                    }
                }
            }
        }
    </script>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{
            background: #1a2238;
            background-image: url("https://img0.baidu.com/it/u=2396092299,2879302393&fm=253&fmt=auto&app=138&f=JPEG?w=1280&h=720");
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            min-height: 100vh;
        }
        .glass{
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(10px);
            border:1px solid rgba(255,255,255,0.2);
        }
        /* 游戏棋盘核心修复 */
        .game-wrap{
            width: min(90vw, 480px);
            aspect-ratio: 1 / 1;
            margin: 0 auto;
            position: relative;
        }
        .game-bg{
            width:100%;height:100%;
            background: rgba(30,64,175,0.25);
            border-radius:16px;
            padding:12px;
            display:grid;
            grid-template-columns: repeat(4,1fr);
            grid-template-rows: repeat(4,1fr);
            gap:10px;
        }
        .grid-cell{
            background:rgba(255,255,255,0.2);
            border-radius:8px;
        }
        #tiles{
            position:absolute;
            top:12px;left:12px;right:12px;bottom:12px;
        }
        .tile{
            position:absolute;
            border-radius:8px;
            display:flex;
            justify-content:center;
            align-items:center;
            font-weight:bold;
            transition:0.15s ease;
        }
        /* 方块配色 */
        .tile-2{background:#e0efff;color:#1e40af;}
        .tile-4{background:#c7dcfb;color:#1e40af;}
        .tile-8{background:#93c5fd;color:#fff;}
        .tile-16{background:#60a5fa;color:#fff;}
        .tile-32{background:#3b82f6;color:#fff;}
        .tile-64{background:#2563eb;color:#fff;}
        .tile-128{background:#1d4ed8;color:#fff;}
        .tile-256{background:#1e40af;color:#fff;}
        .tile-512{background:#7c3aed;color:#fff;}
        .tile-1024{background:#6d28d9;color:#fff;font-size:18px;}
        .tile-2048{background:#5b21b6;color:#fff;font-size:18px;}

        /* 弹窗/提示 */
        .game-over{
            position:absolute;
            inset:0;
            background:rgba(0,0,0,0.7);
            border-radius:16px;
            display:none;
            flex-direction:column;
            align-items:center;
            justify-content:center;
            color:#fff;
        }
        .game-over.show{display:flex;}
        .toast{
            position:fixed;
            right:20px;top:20px;
            background:rgba(30,64,175,0.95);
            color:#fff;
            padding:14px 20px;
            border-radius:8px;
            transform:translateX(120%);
            transition:0.3s;
            z-index:999;
        }
        .toast.show{transform:translateX(0);}
        /* 图鉴锁定 */
        .lock-item .lock{
            position:absolute;inset:0;
            background:rgba(0,0,0,0.6);
            display:flex;flex-direction:column;
            align-items:center;justify-content:center;
            color:#fff;
        }
        .grayscale{filter:grayscale(1);}
    </style>
</head>
<body class="text-white">
    <div class="container mx-auto px-4 py-6">
        <header class="text-center mb-6">
            <h1 class="text-4xl font-bold drop-shadow-lg">薇尔莉特 2048</h1>
            <p class="mt-2 opacity-80 italic">紫罗兰永恒花园</p>
        </header>

        <!-- 分数栏 -->
        <div class="flex justify-between items-center max-w-[480px] mx-auto mb-4">
            <div class="flex gap-3">
                <div class="glass rounded-lg px-4 py-2 text-center">
                    <div class="text-xs opacity-80">当前分数</div>
                    <div id="score" class="text-xl font-bold">0</div>
                </div>
                <div class="glass rounded-lg px-4 py-2 text-center">
                    <div class="text-xs opacity-80">最高分</div>
                    <div id="highScore" class="text-xl font-bold">0</div>
                </div>
            </div>
            <div class="flex gap-2">
                <button id="restart" class="bg-accent px-3 py-2 rounded-lg text-sm">新游戏</button>
                <button id="undo" class="bg-primary px-3 py-2 rounded-lg text-sm">撤销</button>
            </div>
        </div>

        <!-- 游戏主体 -->
        <div class="game-wrap">
            <div class="game-bg">
                <div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div>
                <div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div>
                <div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div>
                <div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div>
            </div>
            <div id="tiles"></div>
            <div class="game-over" id="gameOver">
                <h2 class="text-2xl font-bold mb-3">游戏结束</h2>
                <p>最终得分：<span id="finalScore">0</span></p>
                <button class="mt-4 bg-accent px-5 py-2 rounded-lg" id="againBtn">再来一局</button>
            </div>
        </div>

        <!-- 解锁提示 -->
        <div class="toast" id="toast">
            <div class="font-bold">图鉴解锁</div>
            <div id="toastText">解锁全新薇尔莉特立绘</div>
        </div>

        <!-- 图鉴区域 -->
        <div class="max-w-[480px] mx-auto mt-8 glass rounded-xl p-4">
            <h3 class="text-xl font-bold mb-3">📖 薇尔莉特图鉴</h3>
            <div class="grid grid-cols-3 gap-3" id="gallery">
                <div class="relative rounded-lg overflow-hidden aspect-square">
                    <img src="https://p11-doubao-search-sign.byteimg.com/labis/7f01e9861a600e8b94e0baf245186e3e" class="w-full h-full object-cover">
                </div>
                <div class="relative rounded-lg overflow-hidden aspect-square lock-item" data-need="512">
                    <img src="https://p3-doubao-search-sign.byteimg.com/labis/1340148014a423f3a46a936af8018368" class="w-full h-full object-cover grayscale">
                    <div class="lock"><i class="fa fa-lock text-xl"></i><div class="text-xs mt-1">512解锁</div></div>
                </div>
                <div class="relative rounded-lg overflow-hidden aspect-square lock-item" data-need="1024">
                    <img src="https://p26-doubao-search-sign.byteimg.com/labis/abf21f24bdd24fbc71e78ce005f007ce" class="w-full h-full object-cover grayscale">
                    <div class="lock"><i class="fa fa-lock text-xl"></i><div class="text-xs mt-1">1024解锁</div></div>
                </div>
                <div class="relative rounded-lg overflow-hidden aspect-square lock-item" data-need="2048">
                    <img src="https://p11-doubao-search-sign.byteimg.com/labis/9909c2eba44677bf30b218a73a41d832" class="w-full h-full object-cover grayscale">
                    <div class="lock"><i class="fa fa-lock text-xl"></i><div class="text-xs mt-1">2048解锁</div></div>
                </div>
                <div class="relative rounded-lg overflow-hidden aspect-square lock-item" data-need="4096">
                    <img src="https://p11-doubao-search-sign.byteimg.com/labis/f3c616952357713b85201662fef0baf3" class="w-full h-full object-cover grayscale">
                    <div class="lock"><i class="fa fa-lock text-xl"></i><div class="text-xs mt-1">4096解锁</div></div>
                </div>
                <div class="relative rounded-lg overflow-hidden aspect-square lock-item" data-need="8192">
                    <img src="https://p3-flow-imagex-sign.byteimg.com/tos-cn-i-a9rns2rl98/rc/pc/super_tool/01ec353c81834cebb3c44c38637fb252" class="w-full h-full object-cover grayscale">
                    <div class="lock"><i class="fa fa-lock text-xl"></i><div class="text-xs mt-1">8192解锁</div></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const game = {
            size:4,
            board:[],
            score:0,
            highScore:0,
            lastBoard:null,
            lastScore:0,
            over:false,
            unlockList:[],
            init(){
                // 读取本地存储
                this.highScore = Number(localStorage.getItem("vio2048_hs")) || 0;
                this.unlockList = JSON.parse(localStorage.getItem("vio2048_unlock")) || [];
                this.resetBoard();
                this.bindEvent();
                this.updateHS();
                this.loadUnlock();
                this.addRandom();
                this.addRandom();
                this.render();
            },
            // 重置棋盘
            resetBoard(){
                this.board = Array(this.size).fill().map(()=>Array(this.size).fill(0));
                this.score = 0;
                this.over = false;
            },
            // 绑定事件
            bindEvent(){
                // 键盘
                document.addEventListener("keydown",e=>{
                    if(this.over)return;
                    let dir;
                    switch(e.key){
                        case "ArrowUp":dir="up";break;
                        case "ArrowDown":dir="down";break;
                        case "ArrowLeft":dir="left";break;
                        case "ArrowRight":dir="right";break;
                    }
                    if(dir) this.move(dir);
                })
                // 按钮
                document.getElementById("restart").onclick = ()=>this.newGame();
                document.getElementById("againBtn").onclick = ()=>this.newGame();
                document.getElementById("undo").onclick = ()=>this.undo();
                // 触摸滑动
                let sx,sy;
                const wrap = document.querySelector(".game-wrap");
                wrap.addEventListener("touchstart",e=>{
                    sx = e.touches[0].clientX;
                    sy = e.touches[0].clientY;
                })
                wrap.addEventListener("touchend",e=>{
                    if(!sx||this.over)return;
                    let ex = e.changedTouches[0].clientX;
                    let ey = e.changedTouches[0].clientY;
                    let dx = ex-sx, dy = ey-sy;
                    if(Math.abs(dx) > Math.abs(dy)){
                        if(dx>30)this.move("right");
                        if(dx<-30)this.move("left");
                    }else{
                        if(dy>30)this.move("down");
                        if(dy<-30)this.move("up");
                    }
                    sx=null;sy=null;
                })
            },
            // 新游戏
            newGame(){
                this.resetBoard();
                document.getElementById("gameOver").classList.remove("show");
                this.addRandom();
                this.addRandom();
                this.render();
                this.updateScore();
            },
            // 保存快照 用于撤销
            saveSnap(){
                this.lastBoard = JSON.parse(JSON.stringify(this.board));
                this.lastScore = this.score;
            },
            undo(){
                if(!this.lastBoard)return;
                this.board = this.lastBoard;
                this.score = this.lastScore;
                this.over = false;
                document.getElementById("gameOver").classList.remove("show");
                this.render();
                this.updateScore();
            },
            // 随机生成方块
            addRandom(){
                let empty = [];
                for(let i=0;i<4;i++){
                    for(let j=0;j<4;j++){
                        if(this.board[i][j]===0) empty.push({x:i,y:j});
                    }
                }
                if(empty.length===0)return false;
                let p = empty[Math.floor(Math.random()*empty.length)];
                this.board[p.x][p.y] = Math.random()>0.1?2:4;
                return true;
            },
            // 移动逻辑
            move(dir){
                this.saveSnap();
                let move = false;
                switch(dir){
                    case "left": move = this.moveLeft(); break;
                    case "right": move = this.moveRight(); break;
                    case "up": move = this.moveUp(); break;
                    case "down": move = this.moveDown(); break;
                }
                if(move){
                    this.addRandom();
                    this.render();
                    this.checkStatus();
                }
            },
            moveLeft(){
                let m = false;
                for(let i=0;i<4;i++){
                    let row = this.board[i].filter(v=>v);
                    for(let j=0;j<row.length-1;j++){
                        if(row[j]===row[j+1]){
                            row[j] *=2;
                            this.score += row[j];
                            this.checkUnlock(row[j]);
                            row.splice(j+1,1);
                        }
                    }
                    let newRow = Array(4).fill(0);
                    row.forEach((v,idx)=>newRow[idx]=v);
                    if(JSON.stringify(newRow) !== JSON.stringify(this.board[i])) m=true;
                    this.board[i] = newRow;
                }
                this.updateScore();
                return m;
            },
            moveRight(){
                let m = false;
                for(let i=0;i<4;i++){
                    let row = this.board[i].filter(v=>v);
                    for(let j=row.length-1;j>0;j--){
                        if(row[j]===row[j-1]){
                            row[j] *=2;
                            this.score += row[j];
                            this.checkUnlock(row[j]);
                            row.splice(j-1,1);
                            j--;
                        }
                    }
                    let newRow = Array(4).fill(0);
                    row.reverse().forEach((v,idx)=>newRow[3-idx]=v);
                    if(JSON.stringify(newRow) !== JSON.stringify(this.board[i])) m=true;
                    this.board[i] = newRow;
                }
                this.updateScore();
                return m;
            },
            moveUp(){
                let m = false;
                for(let y=0;y<4;y++){
                    let col = [];
                    for(let x=0;x<4;x++) col.push(this.board[x][y]);
                    col = col.filter(v=>v);
                    for(let j=0;j<col.length-1;j++){
                        if(col[j]===col[j+1]){
                            col[j] *=2;
                            this.score += col[j];
                            this.checkUnlock(col[j]);
                            col.splice(j+1,1);
                        }
                    }
                    let newCol = Array(4).fill(0);
                    col.forEach((v,idx)=>newCol[idx]=v);
                    for(let x=0;x<4;x++){
                        if(this.board[x][y] !== newCol[x]) m=true;
                        this.board[x][y] = newCol[x];
                    }
                }
                this.updateScore();
                return m;
            },
            moveDown(){
                let m = false;
                for(let y=0;y<4;y++){
                    let col = [];
                    for(let x=0;x<4;x++) col.push(this.board[x][y]);
                    col = col.filter(v=>v);
                    for(let j=col.length-1;j>0;j--){
                        if(col[j]===col[j-1]){
                            col[j] *=2;
                            this.score += col[j];
                            this.checkUnlock(col[j]);
                            col.splice(j-1,1);
                            j--;
                        }
                    }
                    let newCol = Array(4).fill(0);
                    col.reverse().forEach((v,idx)=>newCol[3-idx]=v);
                    for(let x=0;x<4;x++){
                        if(this.board[x][y] !== newCol[x]) m=true;
                        this.board[x][y] = newCol[x];
                    }
                }
                this.updateScore();
                return m;
            },
            // 渲染方块 修复错位
            render(){
                const container = document.getElementById("tiles");
                container.innerHTML = "";
                const gap = 10;
                const pad = 12;
                for(let i=0;i<4;i++){
                    for(let j=0;j<4;j++){
                        let val = this.board[i][j];
                        if(!val)continue;
                        let tile = document.createElement("div");
                        tile.className = `tile tile-${val}`;
                        // 精准计算位置大小
                        let cellW = `calc((100% - ${gap*3}px) / 4)`;
                        tile.style.width = cellW;
                        tile.style.height = cellW;
                        tile.style.left = `calc(${pad}px + ${j} * (${cellW} + ${gap}px))`;
                        tile.style.top = `calc(${pad}px + ${i} * (${cellW} + ${gap}px))`;
                        tile.innerText = val;
                        container.appendChild(tile);
                    }
                }
            },
            // 更新分数
            updateScore(){
                document.getElementById("score").innerText = this.score;
                // 修复最高分逻辑
                if(this.score > this.highScore){
                    this.highScore = this.score;
                    localStorage.setItem("vio2048_hs",this.highScore);
                    this.updateHS();
                }
            },
            updateHS(){
                document.getElementById("highScore").innerText = this.highScore;
            },
            // 检测图鉴解锁【核心修复】
            checkUnlock(num){
                const needList = [512,1024,2048,4096,8192];
                if(needList.includes(num) && !this.unlockList.includes(num)){
                    this.unlockList.push(num);
                    localStorage.setItem("vio2048_unlock",JSON.stringify(this.unlockList));
                    this.doUnlock(num);
                }
            },
            doUnlock(num){
                const items = document.querySelectorAll(`.lock-item[data-need="${num}"]`);
                items.forEach(el=>{
                    el.querySelector("img").classList.remove("grayscale");
                    el.querySelector(".lock").remove();
                })
                // 解锁提示
                const toast = document.getElementById("toast");
                document.getElementById("toastText").innerText = `成功解锁 ${num} 限定图鉴！`;
                toast.classList.add("show");
                setTimeout(()=>toast.classList.remove("show"),2500);
            },
            // 加载已解锁
            loadUnlock(){
                this.unlockList.forEach(need=>{
                    const el = document.querySelector(`.lock-item[data-need="${need}"]`);
                    if(el){
                        el.querySelector("img").classList.remove("grayscale");
                        let lock = el.querySelector(".lock");
                        if(lock) lock.remove();
                    }
                })
            },
            // 检测游戏结束
            checkStatus(){
                // 胜利
                for(let i=0;i<4;i++){
                    for(let j=0;j<4;j++){
                        if(this.board[i][j]===2048){
                            this.over = true;
                            this.showOver("恭喜合成2048！");
                            return;
                        }
                    }
                }
                // 无空格
                let hasEmpty = false;
                for(let i=0;i<4;i++)for(let j=0;j<4;j++)if(this.board[i][j]===0)hasEmpty=true;
                if(hasEmpty)return;
                // 无相邻可合并
                let canMerge = false;
                for(let i=0;i<4;i++){
                    for(let j=0;j<4;j++){
                        let v = this.board[i][j];
                        if(j<3&&v===this.board[i][j+1])canMerge=true;
                        if(i<3&&v===this.board[i+1][j])canMerge=true;
                    }
                }
                if(!canMerge){
                    this.over = true;
                    this.showOver("游戏结束");
                }
            },
            showOver(txt){
                document.querySelector(".game-over h2").innerText = txt;
                document.getElementById("finalScore").innerText = this.score;
                document.getElementById("gameOver").classList.add("show");
            }
        }
        game.init();
    </script>
</body>
</html>
